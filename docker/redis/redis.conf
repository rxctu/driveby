# SECURITY: Bind only to internal network
bind 0.0.0.0
protected-mode yes

# SECURITY: Require authentication
# Password is loaded from Docker secret at runtime via entrypoint
# For now, use requirepass with env substitution
requirepass REDIS_SECRET_PLACEHOLDER

# SECURITY: Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "EPIDRIVE_CONFIG"

# Persistence
dir /data
appendonly yes
appendfsync everysec

# SECURITY: Limit memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# SECURITY: Disable Lua scripting abuse
lua-time-limit 5000

# Logging
loglevel notice
