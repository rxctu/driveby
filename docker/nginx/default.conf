server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php;

    charset utf-8;

    # SECURITY: Hide server version
    server_tokens off;

    # SECURITY: Limit request body size (prevent large upload attacks)
    client_max_body_size 10M;

    # SECURITY: Timeouts to prevent slowloris attacks
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 65s;

    # SECURITY: Limit buffer sizes to prevent buffer overflow attacks
    client_body_buffer_size 1K;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;

    # Gzip compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|webp|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffering off;

        # SECURITY: Hide PHP version and other server headers
        fastcgi_hide_header X-Powered-By;
        fastcgi_hide_header X-Runtime;
        fastcgi_hide_header X-Version;
    }

    # SECURITY: Block access to hidden files (except .well-known for SSL)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # SECURITY: Block access to sensitive files
    location ~* \.(env|log|sql|bak|old|orig|dist|save|swp)$ {
        deny all;
        return 404;
    }

    # SECURITY: Block access to composer/package files
    location ~ /(composer\.(json|lock)|package\.(json|lock)|artisan)$ {
        deny all;
        return 404;
    }

    # SECURITY: Block access to storage and vendor directories
    location ~ ^/(storage|vendor)/ {
        deny all;
        return 404;
    }
}
