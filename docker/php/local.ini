; Upload limits
upload_max_filesize=10M
post_max_size=10M
memory_limit=256M
max_execution_time=60

; SECURITY: Hide PHP version
expose_php=Off

; SECURITY: Disable dangerous functions
disable_functions=exec,passthru,shell_exec,system,proc_open,popen,parse_ini_file,show_source,dl

; SECURITY: Error handling - never display errors in production
display_errors=Off
display_startup_errors=Off
log_errors=On
error_log=/var/log/php-fpm/php_errors.log
error_reporting=E_ALL

; SECURITY: Session hardening
session.cookie_httponly=1
session.cookie_secure=1
session.use_strict_mode=1
session.use_only_cookies=1
session.cookie_samesite=Strict
session.sid_length=48
session.sid_bits_per_character=6

; SECURITY: Prevent file inclusion attacks
allow_url_fopen=On
allow_url_include=Off

; SECURITY: Limit path disclosure
open_basedir=/var/www:/tmp

[opcache]
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=10000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.jit=1255
opcache.jit_buffer_size=128M
