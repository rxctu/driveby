; Reverb-specific PHP config
; Needs broader open_basedir for certificate checking
upload_max_filesize=10M
post_max_size=10M
memory_limit=256M
max_execution_time=0

expose_php=Off

; Reverb needs broader basedir (checks cert paths on startup)
open_basedir=/var/www:/tmp:/root

display_errors=Off
log_errors=On
error_log=/tmp/reverb_errors.log
error_reporting=E_ALL

allow_url_fopen=On
allow_url_include=Off

[opcache]
opcache.enable=1
opcache.memory_consumption=64
opcache.interned_strings_buffer=4
opcache.max_accelerated_files=4000
opcache.validate_timestamps=0
